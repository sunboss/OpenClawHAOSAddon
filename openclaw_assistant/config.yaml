name: OpenClaw HAOS Add-on
version: "2026.04.02.1"
slug: openclaw_assistant
description: Run OpenClaw inside Home Assistant OS as a dedicated HAOS add-on.
url: https://github.com/sunboss/OpenClawHAOSAddon
image: ghcr.io/sunboss/openclawhaosaddon
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
hassio_api: false
homeassistant_api: false
host_network: true

# Home Assistant Ingress (UI inside the add-on page)
ingress: true
ingress_port: 48099
panel_title: OpenClaw HAOS Add-on
panel_icon: mdi:robot

map:
  - addon_config:rw
  - share:rw
  - media:rw
options:
  timezone: "Asia/Shanghai"

  # Enable web terminal inside Home Assistant (Ingress) via ttyd
  enable_terminal: true

  # Terminal port (change if 7681 conflicts with another service)
  terminal_port: 7681

  # Public base URL for opening the native Gateway Web UI in a new tab.
  # Recommended: no trailing slash, and prefer HTTPS unless you are using localhost.
  # Example: "https://example.duckdns.org:12345" or "https://192.168.1.10:18789"
  gateway_public_url: ""

  # Optional: Home Assistant long-lived token (for local HA API scripts/tools)
  homeassistant_token: ""

  # Enable native Home Assistant MCP registration at startup.
  # When enabled and homeassistant_token is set, the add-on will register
  # Home Assistant's built-in /api/mcp endpoint in mcporter during startup.
  # Requires a Home Assistant version that exposes the native MCP endpoint.
  auto_configure_mcp: true

  # Enable Gemini-backed memory search while keeping your main chat model unchanged.
  # When enabled, the add-on will configure OpenClaw memory search to use Gemini
  # embeddings and export GEMINI_API_KEY to the gateway process.
  enable_gemini_memory_search: false

  # Optional Google AI Studio / Gemini API key for memory search.
  # This is only used for the Gemini memory/embedding path and does not replace
  # your main chat model provider configuration.
  gemini_api_key: ""

  # Default Gemini embedding model for memory search when enabled.
  gemini_memory_model: "gemini-embedding-001"

  # Enable Brave Search as the web_search provider.
  # When enabled and a Brave API key is set, the add-on will export BRAVE_API_KEY
  # and switch OpenClaw web search to the official Brave provider at startup.
  enable_brave_search: false

  # Optional Brave Search API key.
  # This only affects the web_search tool and does not replace your main chat model.
  brave_api_key: ""

  # Automatically approve pending local device pairing requests.
  # Recommended for personal HAOS installs where you are the only operator.
  auto_approve_device_pairing: true

  # Optional: outbound HTTP/HTTPS proxy for OpenClaw network access.
  # Example: "http://192.168.2.1:3128"
  http_proxy: ""

  # Optional: Router SSH defaults (leave empty if you don't need router automation)
  # This is a generic SSH configuration intended for a router/firewall or any network device
  # reachable from inside the HA host LAN.
  router_ssh_host: ""
  router_ssh_user: ""
  router_ssh_key_path: "/data/keys/router_ssh"

  # Cleanup stale session lock files left after crashes/restarts
  clean_session_locks_on_start: true
  clean_session_locks_on_exit: true

  # Gateway mode:
  # - local: Run gateway locally (recommended for most users)
  # - remote: Connect to a remote gateway
  # Default is local.
  gateway_mode: local

  # Remote gateway URL (used when gateway_mode=remote)
  # Example: "ws://192.168.1.20:18789" or "wss://gateway.example.com:443"
  gateway_remote_url: ""

  # Gateway network bind mode:
  # - loopback: bind to 127.0.0.1 only (local access only, most secure)
  # - lan: bind to all interfaces (accessible from local network)
  # - tailnet: bind to Tailscale IP only (accessible only via Tailscale; recommended for private remote access)
  # Default is loopback for security.
  gateway_bind_mode: loopback

  # Gateway port to listen on
  gateway_port: 18789

  # Access mode preset; simplifies secure access configuration.
  # custom: use individual gateway_bind_mode / auth_mode settings
  # local_only: loopback + token auth (Ingress / terminal only, most secure)
  # lan_https: Built-in HTTPS reverse proxy for LAN access (recommended for phones/tablets)
  # lan_reverse_proxy: LAN bind + trusted-proxy for an external identity-aware reverse proxy
  #                    (nginx + oauth2-proxy, Caddy auth, Traefik forward auth, Pomerium, etc.)
  #                    Do not use this with a plain TLS terminator or load balancer.
  # tailnet_https: Tailscale interface bind + token auth
  access_mode: lan_https

  # Gateway authentication mode:
  # - token: standard token auth (default)
  # - trusted-proxy: trust auth headers from configured reverse proxies
  gateway_auth_mode: token

  # Comma-separated trusted proxy IP/CIDR list for trusted-proxy mode.
  # Only use trusted-proxy when your reverse proxy actually authenticates users
  # and there is no direct path that bypasses the proxy.
  # Example: "127.0.0.1,192.168.88.0/24"
  gateway_trusted_proxies: ""

  # Additional allowed origins for gateway.controlUi.allowedOrigins.
  # Merged with built-in defaults and existing configured origins.
  # In lan_https mode, hostnames/IPs from these origins are also added to the
  # TLS certificate SAN so the cert is valid for custom domains.
  # Example: "https://ha.example.com:8443,capacitor://localhost"
  gateway_additional_allowed_origins: ""

  # Enable OpenAI-compatible Chat Completions API endpoint
  # When enabled, OpenClaw can be used as a conversation agent in HA Assist pipeline
  # via Extended OpenAI Conversation (HACS) or any OpenAI-compatible client
  enable_openai_api: true

  # Force IPv4-first DNS result ordering for Node fetch/network calls.
  # Most HAOS VMs lack IPv6 egress, causing web_fetch / Telegram timeouts.
  # Default: true (recommended). Set to false only if you need IPv6.
  force_ipv4_dns: true

  # Nginx access log verbosity:
  # full: log all requests (useful for debugging)
  # minimal: suppress repetitive HA health-check and polling requests (default)
  nginx_log_level: minimal

  # Environment variables to pass to the gateway process at startup.
  # Format: list of objects with name/value fields.
  # Example:
  #   gateway_env_vars:
  #     - name: OPENAI_API_KEY
  #       value: "sk-abc123"
  #     - name: LOG_LEVEL
  #       value: "debug"
  # Reserved keys are blocked to protect runtime/security
  # (e.g. PATH, HOME, NODE_OPTIONS, NODE_PATH, OPENCLAW_*, proxy vars).
  # Limits: max 50 variables, max key length 255 chars, max value length 10000 chars
  gateway_env_vars: []

  # Channel tokens (optional convenience fields)
  # Set these to auto-inject tokens into openclaw.json on startup.
  # Equivalent to running: openclaw channels add --channel telegram --token "..."
  # Leave blank if you prefer to configure channels manually via the terminal.

  # Telegram: create a bot via @BotFather and paste the token here.
  telegram_bot_token: ""

  # Discord: Bot token from https://discord.com/developers/applications
  discord_bot_token: ""

  # Slack: Bot token (xoxb-...) from your Slack app settings
  slack_bot_token: ""

  # Slack: App-level token (xapp-...) for Socket Mode
  slack_app_token: ""

  # Agent sandbox mode
  # Controls tool execution isolation for non-main (group/channel) sessions.
  # - off:      no sandboxing (default; fine for single-user personal use)
  # - non-main: run tool execution for group/channel sessions in Docker
  #             (requires Docker socket access; see SECURITY.md)
  # Recommended: leave as "off" unless you expose the bot to untrusted users.
  sandbox_mode: "off"


schema:
  timezone: str
  enable_terminal: bool?
  terminal_port: int(1024,65535)?
  gateway_public_url: str?
  homeassistant_token: str?
  auto_configure_mcp: bool?
  enable_gemini_memory_search: bool?
  gemini_api_key: str?
  gemini_memory_model: str?
  enable_brave_search: bool?
  brave_api_key: str?
  auto_approve_device_pairing: bool?
  http_proxy: str?

  router_ssh_host: str
  router_ssh_user: str
  router_ssh_key_path: str

  clean_session_locks_on_start: bool?
  clean_session_locks_on_exit: bool?
  gateway_mode: list(local|remote)?
  gateway_remote_url: str?
  gateway_bind_mode: list(loopback|lan|tailnet)?
  gateway_port: int(1,65535)?
  access_mode: list(custom|local_only|lan_https|lan_reverse_proxy|tailnet_https)?
  gateway_auth_mode: list(token|trusted-proxy)?
  gateway_trusted_proxies: str?
  gateway_additional_allowed_origins: str?
  enable_openai_api: bool?
  force_ipv4_dns: bool?
  gateway_env_vars:
    - name: "match(^[A-Z_][A-Z0-9_]*$)"
      value: str
  nginx_log_level: list(full|minimal)?
  telegram_bot_token: str?
  discord_bot_token: str?
  slack_bot_token: str?
  slack_app_token: str?
  sandbox_mode: list(off|non-main)?


