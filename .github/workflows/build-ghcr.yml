name: Build and Push GHCR Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "openclaw_assistant/**"
      - ".github/workflows/build-ghcr.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract add-on version
        id: meta
        shell: bash
        run: |
          VERSION="$(grep -E '^version:' openclaw_assistant/config.yaml | head -1 | sed -E 's/version:\s*"([^"]+)"/\1/')"
          if [ -z "${VERSION}" ]; then
            echo "Failed to parse version from openclaw_assistant/config.yaml" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using version: ${VERSION}"

  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arch image
        uses: docker/build-push-action@v6
        with:
          context: ./openclaw_assistant
          file: ./openclaw_assistant/Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          provenance: false
          tags: |
            ghcr.io/sunboss/openclawhaosaddon:${{ needs.meta.outputs.version }}-${{ matrix.suffix }}
            ghcr.io/sunboss/openclawhaosaddon:latest-${{ matrix.suffix }}

  manifest:
    needs:
      - meta
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        shell: bash
        run: |
          VERSION="${{ needs.meta.outputs.version }}"

          docker buildx imagetools create \
            -t ghcr.io/sunboss/openclawhaosaddon:${VERSION} \
            -t ghcr.io/sunboss/openclawhaosaddon:latest \
            ghcr.io/sunboss/openclawhaosaddon:${VERSION}-amd64 \
            ghcr.io/sunboss/openclawhaosaddon:${VERSION}-arm64

      - name: Inspect published image
        shell: bash
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          docker buildx imagetools inspect ghcr.io/sunboss/openclawhaosaddon:${VERSION}
