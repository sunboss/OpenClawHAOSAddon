name: Build and Push GHCR Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "openclaw_assistant/**"
      - ".github/workflows/build-ghcr.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract add-on version
        id: meta
        shell: bash
        run: |
          VERSION="$(grep -E '^version:' openclaw_assistant/config.yaml | head -1 | sed -E 's/version:\s*"([^"]+)"/\1/')"
          if [ -z "${VERSION}" ]; then
            echo "Failed to parse version from openclaw_assistant/config.yaml" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using version: ${VERSION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: ./openclaw_assistant
          file: ./openclaw_assistant/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/sunboss/openclawhaosaddon:${{ steps.meta.outputs.version }}
            ghcr.io/sunboss/openclawhaosaddon:latest
